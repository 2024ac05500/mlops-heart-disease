name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Set PYTHONPATH for tests
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      - name: Lint
        run: |
          python -m pip install flake8
          flake8 --max-line-length=120
      - name: Run tests with coverage
        run: |
          pytest -q \
            --cov=src \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
      - name: Quick train smoke (CI)
        run: |
          python -c "from src.train import train_and_log; from sklearn.datasets import make_classification; X,y=make_classification(n_samples=100,n_features=10,random_state=0); train_and_log(X,y,out_dir='models',quick=True)"
      - name: Upload models artifact
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: models/
